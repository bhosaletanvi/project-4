<html>
    <style>
        *{
            margin: 0px;
            padding: 0px;
        }
        .page1{
            /* border: 4px solid red; */
            width: 100vw;
            height: 100vh;
            box-sizing: border-box;
            padding: 2em 5em;
            border-end-start-radius: 15%;
            border-bottom-right-radius: 15%;
            background-color: #19c9bd;
            display: flex;
            flex-direction: column;
        }
        .navbar{
            /* border: 2px solid green; */
            display: flex;
            justify-content: space-between;
            color: white;
        }
        .logo{
            /* border: 2px solid rgb(45, 0, 128); */
            font-size: 30px;
        }
        .navs{
            /* border: 2px solid rgb(23, 0, 128); */
            display: flex;
            gap: 3em;
            align-items: center;

        }
        .nav_btn_container{
            /* border: 2px solid rgb(4, 0, 128); */
            display: flex;
            gap: 1em;
        }
        .nav-content{
            display: flex;
            /* border: 2px solid rebeccapurple; */
            gap: 6em;

        }
        .login-btn{
            padding: 0em 2em;
            border-radius: 50px;
            background-color: white;
            border: none;
            color: black;
        }
        .signup-btn{
            padding: 0em 2em;
            border-radius: 50px;
            background-color: #5bd7cfe2;
            border: none;
        }
        .page1-content{
            /* border: 2px solid red; */
            display: flex;
            width: 100%;
            height: 80%;
            margin-top: 5em;
        }
        .p1-main-content{
            display: flex;
            padding: 3em 6em;
            flex-direction: column;
            /* border: 2px solid rgb(34, 255, 0); */
            width: 50%;
            box-sizing: border-box;
            gap: 2em;
            color: white;
        }
        .p1-img-box{
            width: 40%;
            /* border: 2px solid red; */
            height: 100%;
        }
        .p1-img{
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .p1-main-title{
            font-size: 40px;
        }
        .p1-inner-bottom{
            display: flex;
            gap: 1em;
        }
        .join-free-btn{
            padding: 0.7em 1em ;
            border-radius: 20px;
            background-color: #68eae1;
            border: none;
        }
        .play-pause-btn{
            padding: 1em 1.3em;
            border-radius: 50%;
            border: none;
        }
    </style>
    <body>
        <div class="page1">
            <div class="navbar">
                <div class="logo">TOTC</div>
                <div class="nav-content">
                <div class="navs">
                    <p>Home</p>
                    <p>Courses</p>
                    <p>career</p>
                    <p>Blog</p>
                    <p>About US</p>
                </div>
                <div class="nav_btn_container">
                    <button class="login-btn">Login</button>
                    <button class="signup-btn">Sign Up</button>
                </div>
                </div>
            </div>
            <div class="page1-content">
                <div class="p1-main-content">
                    <h1 class="p1-main-title"><span style="color: orange;">Studying</span> Online is now much easier</h1>
                    <p style=" padding-right: 10em;">TOTC is an interesting platform that will teach you in more an interactive way</p>
                    <div class="p1-inner-bottom">
                        <button class="join-free-btn">Join for Free</button>
                        <button class="play-pause-btn"></button>
                        <p style="align-self: center; color: black;">Watch how it works</p>
                    </div>
                </div>
                <div class="p1-img-box">
                    <img class="p1-img" src="img/p1-img.png" alt="">
                </div>
            </div>
        </div>
        <div class="page2">

        </div>
        <div class="page3">

        </div>
    </body>
</html>
